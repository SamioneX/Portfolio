name: Deploy Portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for OIDC token exchange with AWS
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate resume PDF
        run: node scripts/generate-resume.js

      - name: Build site
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Discover deployment targets from CloudFormation
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name SokechSiteStack \
            --query 'Stacks[0].Outputs' \
            --output json)
          echo "S3_BUCKET=$(echo $OUTPUTS | jq -r '.[] | select(.OutputKey=="SiteBucketName") | .OutputValue')" >> $GITHUB_ENV
          echo "CF_DIST_ID=$(echo $OUTPUTS | jq -r '.[] | select(.OutputKey=="SiteDistributionId") | .OutputValue')" >> $GITHUB_ENV

      - name: Sync assets to S3 (long-lived cache)
        run: |
          aws s3 sync ./dist s3://$S3_BUCKET \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

      - name: Sync index.html (no cache)
        run: |
          aws s3 cp ./dist/index.html s3://$S3_BUCKET/index.html \
            --cache-control "no-cache" \
            --content-type "text/html"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CF_DIST_ID \
            --paths "/*"

# ── Required GitHub Secret ────────────────────────────────────────────────
# Set in: GitHub repo → Settings → Secrets and variables → Actions
#
#   AWS_ROLE_ARN   IAM role ARN (SokechSiteStack.DeployRoleArn output)
#                  e.g. arn:aws:iam::320524884497:role/sokech-github-actions-deploy
